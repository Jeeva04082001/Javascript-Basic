Selecting and Manipulating Elements Using ID


What is document.getElementByID()?


It is a method in the Document Object Model(DOM) that allows you
to select a single element from the document using its unique 
ID attribute. IDs should be unique within the document, meaning that there
should be only one element with a specific ID. if multiple elements
have the same ID, this method will only select the firt one it encounters.
